name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build all targets
        run: bun run build

      - name: Package Chromium zip
        run: bun run chromium:zip

      - name: Sign Firefox extension
        run: bunx web-ext sign -s dist/firefox -a dist --channel=listed
        env:
          WEB_EXT_API_KEY: ${{ secrets.JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Collect and rename artifacts
        run: |
          mv dist/spotify-details-extractor-chromium.zip spotify-details-extractor-chromium.zip
          cp dist/spicetify/extractor.js spotify-details-extractor-spicetify.js
          mv dist/spotify_details_extractor-*.xpi spotify-details-extractor-firefox.xpi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            spotify-details-extractor-chromium.zip \
            spotify-details-extractor-firefox.xpi \
            spotify-details-extractor-spicetify.js \
            --clobber
