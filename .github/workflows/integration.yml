name: Integration

# Exercises every source against real, live album pages and validates the
# full browser-extension pipeline end-to-end. Catches breakage when a
# streaming service changes its HTML format or when extension wiring
# (manifest, service worker, content scripts) regresses.
#
# Runs on a weekly schedule, on pushes to main, and on-demand via the
# "Run workflow" button in GitHub Actions.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build all targets
        run: bun run build

      - name: Verify extractors against live sources
        run: bun run verify

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: E2E tests (browser extension)
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
