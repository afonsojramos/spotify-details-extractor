name: Integration

# Exercises each source's extractor against real, live album pages.
# Catches breakage when Spotify or Qobuz change their HTML format so
# we find out before users report it.
#
# Runs on a weekly schedule, on pushes to main, and on-demand via the
# "Run workflow" button in GitHub Actions.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify extractors against live sources
        run: bun run verify
